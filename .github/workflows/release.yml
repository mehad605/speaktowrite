name: Build & Release Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Enter the release version (e.g., v1.0.1)'
        required: true
        type: string
      generate_release_notes:
        description: 'Generate human-readable, user-friendly release notes automatically?'
        type: boolean
        required: false
        default: false

jobs:
  release:
    name: Build & Release Android App
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # Allows saving and updating caches to optimize build times of subsequent runs
          cache-read-only: false

      - name: Grant Execute Permissions
        run: chmod +x ./gradlew

      - name: Determine Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VER="${{ github.event.inputs.version_number }}"
            echo "GENERATE_NOTES=${{ github.event.inputs.generate_release_notes }}" >> $GITHUB_ENV
          else
            RAW_VER="${{ github.ref_name }}"
            echo "GENERATE_NOTES=true" >> $GITHUB_ENV
          fi
          CLEAN_VER=$(echo "$RAW_VER" | sed 's/^v//')
          VAL_CODE=$((100 + ${{ github.run_number }}))
          echo "VERSION=$RAW_VER" >> $GITHUB_ENV
          echo "CLEAN_VERSION=$CLEAN_VER" >> $GITHUB_ENV
          echo "VERSION_CODE=$VAL_CODE" >> $GITHUB_ENV

      - name: Decode Keystore (Secure CI/CD)
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY }}
        run: |
          if [ -n "$SIGNING_KEY_BASE64" ]; then
            echo "$SIGNING_KEY_BASE64" | base64 -di > app/signing-key.jks
          fi

      - name: Build Split Release APKs
        # CI Build Optimizations:
        # --build-cache: Instructs Gradle to use its build cache (stored by setup-gradle action)
        # --no-daemon: Frees up memory on single-use runners immediately upon task completion
        # --parallel: Compiles separate modules and tasks in parallel
        # -Dorg.gradle.jvmargs: Sets optimal JVM heap size (4GB heap size is highly suited for GitHub Actions runners)
        # -Dkotlin.compiler.execution.strategy="in-process": Speeds up Kotlin compilation by avoiding process overhead
        # -Pandroid.enablePngCrunching=false: Speeds up packaging by skipping PNG optimization for debug builds
        env:
          ANDROID_SIGNING_KEY_FILE: "signing-key.jks"
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          APP_VERSION_NAME: ${{ env.CLEAN_VERSION }}
          APP_VERSION_CODE: ${{ env.VERSION_CODE }}
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --no-daemon \
            --parallel \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC" \
            -Dkotlin.compiler.execution.strategy="in-process" \
            -Pandroid.enablePngCrunching=false

      - name: Rename & Package Artifacts
        run: |
          mv app/build/outputs/apk/release/app-arm64-v8a-release*.apk ./speak2write-${{ env.VERSION }}-arm64-v8a.apk
          mv app/build/outputs/apk/release/app-armeabi-v7a-release*.apk ./speak2write-${{ env.VERSION }}-armeabi-v7a.apk
          mv app/build/outputs/apk/release/app-x86-release*.apk ./speak2write-${{ env.VERSION }}-x86.apk
          mv app/build/outputs/apk/release/app-x86_64-release*.apk ./speak2write-${{ env.VERSION }}-x86_64.apk

      - name: Generate Release Notes
        id: notes
        run: |
          git fetch --tags --force

          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p' || echo "")
          CURRENT_TAG="${{ env.VERSION }}"

          if [ -z "$PREV_TAG" ]; then
            NOTES_HEADER="## What's New in $CURRENT_TAG\n\nInitial release.\n"
            COMMITS_LOG=$(git log --oneline --format="* %s" "$CURRENT_TAG" 2>/dev/null || echo "")
          else
            NOTES_HEADER="## What's New in $CURRENT_TAG\n\n### Changes since $PREV_TAG\n"
            COMMITS_LOG=$(git log --oneline --format="* %s" "$PREV_TAG..$CURRENT_TAG" 2>/dev/null || echo "")
          fi

          FEATURES=""
          FIXES=""
          OTHER=""
          while IFS= read -r line; do
            lower=$(echo "$line" | tr '[:upper:]' '[:lower:]')
            # Skip infra/CI/docs/config commits — not user-facing
            case "$lower" in
              *"release"*|*"ci:"*|*"cd:"*|*"workflow"*|*"gitignore"*|*"readme"*|*"docs:"*|*"changelog"*|*"gradle"*|*"dependabot"*|*"bump"*|*"version"*)
                continue ;;
            esac
            case "$lower" in
              *"feat:"*|*"feature:"*|*"add"*|*"new"*|*"implement"*)
                FEATURES="$FEATURES\n$line" ;;
              *"fix:"*|*"bug"*|*"hotfix"*|*"patch"*)
                FIXES="$FIXES\n$line" ;;
              *)
                OTHER="$OTHER\n$line" ;;
            esac
          done <<< "$(echo -e "$COMMITS_LOG")"

          BODY="$NOTES_HEADER"
          if [ -n "$FEATURES" ]; then
            BODY="$BODY\n\n### ✨ New Features\n$FEATURES"
          fi
          if [ -n "$FIXES" ]; then
            BODY="$BODY\n\n### 🐛 Bug Fixes\n$FIXES"
          fi
          if [ -n "$OTHER" ]; then
            BODY="$BODY\n\n### 🔧 Changes\n$OTHER"
          fi

          BODY="${BODY//'%'/'%25'}"
          BODY="${BODY//$'\n'/'%0A'}"
          BODY="${BODY//$'\r'/'%0D'}"

          echo "NOTES_BODY=$BODY" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: ${{ env.NOTES_BODY }}
          draft: false
          prerelease: false
          files: |
            speak2write-${{ env.VERSION }}-arm64-v8a.apk
            speak2write-${{ env.VERSION }}-armeabi-v7a.apk
            speak2write-${{ env.VERSION }}-x86.apk
            speak2write-${{ env.VERSION }}-x86_64.apk
