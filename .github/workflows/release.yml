name: Build & Release Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Release version (e.g. v1.2.3)'
        required: true
        type: string
      generate_release_notes:
        description: 'Auto-generate user-friendly release notes?'
        type: boolean
        required: false
        default: false

jobs:
  release:
    name: Build & Release Android App
    runs-on: ubuntu-latest
    timeout-minutes: 30                    # FIX #13 — prevent hung builds burning runner minutes
    permissions:
      contents: write                      # minimum scope needed to publish a release

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      # FIX #3 — all third-party actions pinned to immutable full commit SHAs
      #           to prevent supply-chain attacks via mutable version tags.
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0                   # needed so we can walk tags for release notes

      # ── Toolchain ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70  # v3.5.0
        with:
          # FIX #8 — only write to cache on tag pushes; other events (if any) read only.
          cache-read-only: ${{ github.event_name != 'push' }}

      - name: Grant Execute Permissions
        run: chmod +x ./gradlew

      # ── Version Calculation ────────────────────────────────────────────────
      # FIX #2 — user input is consumed via an env: block, never via ${{ }} inside
      #           the shell script, preventing shell-injection attacks.
      # FIX #5 — versionCode is derived from semver digits (MAJ*1000000 + MIN*1000 + PAT)
      #           so it is deterministic, strictly increasing, and survives repo transfers.
      - name: Determine Version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version_number }}
          INPUT_GENERATE_NOTES: ${{ github.event.inputs.generate_release_notes }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VER="$INPUT_VERSION"
            echo "GENERATE_NOTES=$INPUT_GENERATE_NOTES" >> $GITHUB_ENV
          else
            RAW_VER="${GITHUB_REF_NAME}"
            echo "GENERATE_NOTES=true" >> $GITHUB_ENV
          fi

          # Strip leading 'v' to get a clean x.y.z string
          CLEAN_VER="${RAW_VER#v}"

          # Validate semver shape (x.y.z) before doing arithmetic on it
          if ! echo "$CLEAN_VER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$CLEAN_VER' is not valid semver (expected x.y.z). Aborting."
            exit 1
          fi

          # Semver-derived versionCode: v1.2.3 → 1002003
          IFS='.' read -r MAJ MIN PAT <<< "$CLEAN_VER"
          VAL_CODE=$(( (MAJ * 1000000) + (MIN * 1000) + PAT ))

          echo "VERSION=$RAW_VER"         >> $GITHUB_ENV
          echo "CLEAN_VERSION=$CLEAN_VER" >> $GITHUB_ENV
          echo "VERSION_CODE=$VAL_CODE"   >> $GITHUB_ENV

      # ── Signing Key ────────────────────────────────────────────────────────
      # FIX #1 — keystore is written to $RUNNER_TEMP (outside the repo checkout)
      #           so it can never be accidentally zipped/uploaded with source files.
      # FIX #4 — fail fast with a clear error when SIGNING_KEY is not configured,
      #           instead of silently producing an unsigned APK.
      - name: Decode Keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY }}
        run: |
          if [ -z "$SIGNING_KEY_BASE64" ]; then
            echo "::error::Secret SIGNING_KEY is not set. Cannot produce a signed release APK."
            exit 1
          fi
          KEYSTORE_PATH="${RUNNER_TEMP}/signing-key.jks"
          echo "$SIGNING_KEY_BASE64" | base64 -di > "$KEYSTORE_PATH"
          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV

      # ── Build ─────────────────────────────────────────────────────────────
      # FIX #10 — removed -Pandroid.enablePngCrunching=false; that flag skips PNG
      #            compression which is harmful on a production release build.
      # FIX #11 — removed --parallel; it only benefits multi-project builds and
      #            adds overhead on this single-module app.
      - name: Build Split Release APKs
        env:
          ANDROID_SIGNING_KEY_FILE: ${{ env.KEYSTORE_PATH }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          APP_VERSION_NAME: ${{ env.CLEAN_VERSION }}
          APP_VERSION_CODE: ${{ env.VERSION_CODE }}
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC" \
            -Dkotlin.compiler.execution.strategy="in-process"

      # ── Verify Signatures ─────────────────────────────────────────────────
      # FIX #9 — verify every APK is properly signed before releasing.
      #           This catches misconfigured keystores before users see them.
      - name: Verify APK Signatures
        run: |
          BUILD_TOOLS_VERSION=$(ls "${ANDROID_HOME}/build-tools" | sort -V | tail -1)
          APKSIGNER="${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/apksigner"
          echo "Using apksigner: $APKSIGNER (build-tools $BUILD_TOOLS_VERSION)"
          for apk in app/build/outputs/apk/release/*.apk; do
            echo "Verifying: $apk"
            "$APKSIGNER" verify --verbose "$apk"
          done

      # ── Package ───────────────────────────────────────────────────────────
      - name: Rename & Package Artifacts
        run: |
          mv app/build/outputs/apk/release/app-arm64-v8a-release*.apk  ./speak2write-${{ env.VERSION }}-arm64-v8a.apk
          mv app/build/outputs/apk/release/app-armeabi-v7a-release*.apk ./speak2write-${{ env.VERSION }}-armeabi-v7a.apk
          mv app/build/outputs/apk/release/app-x86-release*.apk         ./speak2write-${{ env.VERSION }}-x86.apk
          mv app/build/outputs/apk/release/app-x86_64-release*.apk      ./speak2write-${{ env.VERSION }}-x86_64.apk

      # ── Release Notes ─────────────────────────────────────────────────────
      # FIX #6 — respect the generate_release_notes input via the `if:` condition.
      # FIX #7 — use $GITHUB_OUTPUT heredoc syntax (the %0A trick was deprecated in
      #           2022 and corrupts notes containing literal % characters).
      - name: Generate Release Notes
        id: notes
        if: env.GENERATE_NOTES == 'true'
        run: |
          git fetch --tags --force

          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p' || echo "")
          CURRENT_TAG="${{ env.VERSION }}"

          if [ -z "$PREV_TAG" ]; then
            NOTES_HEADER="## What's New in $CURRENT_TAG\n\nInitial release.\n"
            COMMITS_LOG=$(git log --oneline --format="* %s" "$CURRENT_TAG" 2>/dev/null || echo "")
          else
            NOTES_HEADER="## What's New in $CURRENT_TAG\n\n### Changes since $PREV_TAG\n"
            COMMITS_LOG=$(git log --oneline --format="* %s" "$PREV_TAG..$CURRENT_TAG" 2>/dev/null || echo "")
          fi

          FEATURES=""
          FIXES=""
          OTHER=""
          while IFS= read -r line; do
            lower=$(echo "$line" | tr '[:upper:]' '[:lower:]')
            case "$lower" in
              *"release"*|*"ci:"*|*"cd:"*|*"workflow"*|*"gitignore"*|*"readme"*|*"docs:"*|*"changelog"*|*"gradle"*|*"dependabot"*|*"bump"*|*"version"*)
                continue ;;
            esac
            case "$lower" in
              *"feat:"*|*"feature:"*|*"add"*|*"new"*|*"implement"*)
                FEATURES="$FEATURES\n$line" ;;
              *"fix:"*|*"bug"*|*"hotfix"*|*"patch"*)
                FIXES="$FIXES\n$line" ;;
              *)
                OTHER="$OTHER\n$line" ;;
            esac
          done <<< "$(echo -e "$COMMITS_LOG")"

          BODY="$NOTES_HEADER"
          [ -n "$FEATURES" ] && BODY="$BODY\n\n### ✨ New Features\n$FEATURES"
          [ -n "$FIXES"    ] && BODY="$BODY\n\n### 🐛 Bug Fixes\n$FIXES"
          [ -n "$OTHER"    ] && BODY="$BODY\n\n### 🔧 Changes\n$OTHER"

          # Write multi-line output safely via heredoc (not the deprecated %0A trick)
          {
            echo "NOTES_BODY<<EOF"
            echo -e "$BODY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # ── Publish Release ───────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: ${{ steps.notes.outputs.NOTES_BODY }}
          draft: false
          prerelease: false
          files: |
            speak2write-${{ env.VERSION }}-arm64-v8a.apk
            speak2write-${{ env.VERSION }}-armeabi-v7a.apk
            speak2write-${{ env.VERSION }}-x86.apk
            speak2write-${{ env.VERSION }}-x86_64.apk
